services:
  - type: web
    name: bitshark-memes-api
    runtime: node
    plan: free
    region: oregon
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: OPENROUTER_API_KEY
        sync: false
