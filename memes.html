<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bitshark — Meme Factory</title>
  <link rel="icon" href="assets/favicon.png" sizes="32x32" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Luckiest+Guy&family=Roboto:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; min-height: 100vh; overflow-x: hidden; }
    body {
      font-family: 'Roboto', sans-serif;
      color: #ffffff;
      background-color: #051a2c;
      position: relative;
      min-height: 100vh;
    }

    .bg-video-wrap {
      position: fixed;
      inset: 0;
      z-index: -2;
      overflow: hidden;
      background-color: #051a2c;
    }
    .bg-video-wrap video {
      position: absolute;
      top: 50%; left: 50%;
      min-width: 100%;
      min-height: 100%;
      width: auto; height: auto;
      transform: translate(-50%, -50%);
      object-fit: cover;
    }
    .bg-overlay {
      position: fixed;
      inset: 0;
      z-index: -1;
      background: linear-gradient(180deg, rgba(5,15,30,0.7) 0%, rgba(5,15,30,0.7) 100%);
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 30px;
      padding: 22px 50px;
      max-width: 1600px;
      margin: 0 auto;
    }
    .topbar .logo img {
      max-width: 180px;
      height: auto;
      display: block;
    }
    .topbar .nav-right {
      display: flex;
      align-items: center;
      gap: 32px;
    }
    .topbar a {
      color: #ffffff;
      text-decoration: none;
      font-family: 'Luckiest Guy', cursive;
      font-size: 26px;
      letter-spacing: 1.5px;
      text-shadow:
        2px 2px 0 #ff8c1a,
        3px 3px 0 #ff8c1a,
        4px 4px 6px rgba(0,0,0,0.45);
      transition: text-shadow 0.2s ease;
    }
    .topbar a:hover {
      text-shadow:
        2px 2px 0 #ffa64d,
        3px 3px 0 #ffa64d,
        4px 4px 8px rgba(0,0,0,0.5);
    }

    .headline-wrap {
      text-align: center;
      margin: 24px auto 6px;
      padding: 0 20px;
    }
    .headline {
      font-family: 'Luckiest Guy', cursive;
      font-size: clamp(40px, 6vw, 78px);
      letter-spacing: 3px;
      line-height: 1;
      text-shadow: 2px 2px 0 rgba(0,0,0,0.35);
    }
    .headline .plain { color: #ff8c1a; margin-right: 14px; }
    .headline .highlight { color: #ffffff; }

    .subline {
      font-family: 'Luckiest Guy', cursive;
      font-size: clamp(16px, 2vw, 22px);
      letter-spacing: 2px;
      color: #d8dde4;
      text-align: center;
      margin: 8px auto 28px;
    }

    .panel {
      max-width: 760px;
      margin: 10px auto 30px;
      padding: 28px 32px 30px;
      background: linear-gradient(180deg, rgba(8,18,32,0.92) 0%, rgba(12,28,46,0.92) 100%);
      border: 2px solid #ff8c1a;
      border-radius: 14px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.5);
    }
    .panel-label {
      display: block;
      font-family: 'Luckiest Guy', cursive;
      letter-spacing: 1.5px;
      font-size: 20px;
      color: #ff8c1a;
      margin-bottom: 12px;
    }
    .prompt-box {
      width: 100%;
      min-height: 110px;
      resize: vertical;
      background: rgba(5,15,30,0.85);
      color: #ffffff;
      border: 2px solid rgba(255,140,26,0.4);
      border-radius: 10px;
      padding: 14px 16px;
      font-size: 16px;
      font-family: 'Roboto', sans-serif;
      line-height: 1.5;
      outline: none;
      transition: border-color 0.2s ease;
    }
    .prompt-box:focus { border-color: #ff8c1a; }
    .prompt-box::placeholder { color: #6c7a8b; }

    .examples-label {
      display: block;
      font-size: 12px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: #b0b8c4;
      margin: 18px 0 8px;
    }
    .examples-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }
    .chip {
      background: rgba(255,140,26,0.15);
      color: #ffd9b3;
      border: 1px solid rgba(255,140,26,0.5);
      padding: 8px 14px;
      border-radius: 999px;
      font-size: 13px;
      cursor: pointer;
      font-family: 'Roboto', sans-serif;
      transition: background 0.2s ease, color 0.2s ease, transform 0.15s ease;
    }
    .chip:hover {
      background: rgba(255,140,26,0.35);
      color: #ffffff;
      transform: translateY(-1px);
    }

    .generate-row {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 14px;
      flex-wrap: wrap;
      margin: 22px 0 6px;
    }
    .hint {
      text-align: center;
      font-size: 12px;
      color: #8895a6;
      margin: 8px auto 0;
      max-width: 480px;
    }
    .btn-orange {
      display: inline-block;
      background: #ff8c1a;
      color: #ffffff;
      font-weight: 700;
      letter-spacing: 0.5px;
      border: none;
      border-radius: 999px;
      padding: 16px 42px;
      cursor: pointer;
      font-size: 16px;
      font-family: 'Roboto', sans-serif;
      text-decoration: none;
      transition: background 0.2s ease, transform 0.2s ease;
    }
    .btn-orange:hover:not(:disabled) {
      background: #ffa64d;
      transform: translateY(-1px);
    }
    .btn-orange:disabled {
      background: #6c4a26;
      cursor: not-allowed;
      opacity: 0.7;
    }

    .btn-orange-outline {
      display: inline-block;
      background: transparent;
      color: #ffffff;
      font-weight: 700;
      letter-spacing: 0.6px;
      border: 2px solid #ff8c1a;
      border-radius: 999px;
      padding: 11px 26px;
      cursor: pointer;
      font-size: 14px;
      text-decoration: none;
      transition: background 0.2s ease, transform 0.2s ease;
      font-family: 'Roboto', sans-serif;
    }
    .btn-orange-outline:hover {
      background: #ff8c1a;
      transform: translateY(-1px);
    }

    .status {
      text-align: center;
      min-height: 22px;
      margin: 14px 0 0;
      font-size: 14px;
      color: #ffd9b3;
    }
    .status.error { color: #ff7676; }

    .loader {
      display: none;
      text-align: center;
      margin: 20px auto 4px;
    }
    .loader.active { display: block; }
    .loader .shark-spin {
      font-size: 52px;
      display: inline-block;
      animation: swim 1.4s ease-in-out infinite;
    }
    @keyframes swim {
      0%, 100% { transform: translateX(-14px) rotate(-10deg); }
      50% { transform: translateX(14px) rotate(10deg); }
    }
    .loader .label {
      display: block;
      margin-top: 10px;
      font-family: 'Luckiest Guy', cursive;
      letter-spacing: 1.5px;
      color: #ff8c1a;
      font-size: 18px;
    }
    .loader .timer {
      display: block;
      margin-top: 4px;
      font-size: 13px;
      color: #b0b8c4;
    }

    .result-wrap {
      max-width: 760px;
      margin: 10px auto 50px;
      text-align: center;
      padding: 0 14px;
    }
    .result-img {
      width: 100%;
      max-width: 720px;
      border-radius: 14px;
      border: 2px solid #ff8c1a;
      box-shadow: 0 10px 40px rgba(0,0,0,0.6);
      display: block;
      margin: 0 auto 18px;
    }
    .result-actions {
      display: flex;
      justify-content: center;
      gap: 14px;
      flex-wrap: wrap;
      margin-bottom: 14px;
    }

    .footer {
      text-align: center;
      padding: 14px 20px 40px;
      font-style: italic;
      font-size: 14px;
      color: #c4cad3;
    }

    @media (max-width: 1024px) {
      .topbar { flex-direction: column; gap: 16px; padding: 18px 24px; }
      .topbar .nav-right { flex-direction: row; gap: 22px; flex-wrap: wrap; justify-content: center; }
      .panel { padding: 22px 22px 26px; margin: 14px 14px 28px; }
    }
  </style>
</head>
<body>

  <div class="bg-video-wrap">
    <video autoplay muted loop playsinline poster="assets/shark-main.jpeg">
      <source src="assets/background.mp4" type="video/mp4" />
    </video>
  </div>
  <div class="bg-overlay"></div>

  <header class="topbar">
    <div class="logo">
      <a href="index.html"><img src="assets/logo.png" alt="bitshark logo" /></a>
    </div>
    <nav class="nav-right">
      <a href="index.html">Home</a>
      <a href="https://dexscreener.com/solana/hr6ueapfhuj7kdqbzqhfxnjummzvgvfkpawrgvymat7f" target="_blank" rel="noopener">Dexscreener</a>
    </nav>
  </header>

  <div class="headline-wrap">
    <h2 class="headline"><span class="plain">MEME</span><span class="highlight">FACTORY</span></h2>
  </div>
  <div class="subline">Type your wildest idea. Eat the whales. 🦈</div>

  <main class="panel">
    <label class="panel-label" for="prompt">Describe your meme</label>
    <textarea
      id="prompt"
      class="prompt-box"
      placeholder="e.g. Bitshark flying past a giant glowing moon with a rocket strapped to its back"
      maxlength="2000"
    ></textarea>

    <span class="examples-label">Or try an idea</span>
    <div class="examples-row" id="examples">
      <button class="chip" data-prompt="Bitshark flying through space past a giant glowing full moon, stars and nebula in the background, cinematic">🚀 Shark on the Moon</button>
      <button class="chip" data-prompt="Bitshark wearing aviator sunglasses driving a Lamborghini through Miami at night, neon city lights">🕶️ Lambo Shark</button>
      <button class="chip" data-prompt="Bitshark wearing a sharp business suit standing on Wall Street, holding a briefcase, money flying around">💼 Wall Street Shark</button>
      <button class="chip" data-prompt="Bitshark devouring a giant blue whale labeled 'WHALE', dramatic underwater scene, intense action">🐋 Eating Whales</button>
      <button class="chip" data-prompt="Bitshark surfing on a massive golden Bitcoin coin, huge ocean wave behind it, sunset lighting">🏄 Bitcoin Surfer</button>
      <button class="chip" data-prompt="Bitshark riding a SpaceX-style rocket launching into orbit, fire and smoke below, blue sky above">🛸 Rocket Shark</button>
      <button class="chip" data-prompt="Bitshark as a UFC fighter inside an octagon cage, gloves on fins, crowd in the background">🥊 Octagon Shark</button>
      <button class="chip" data-prompt="Bitshark in front of the White House podium giving a speech, presidential setting, flags">🇺🇸 President Shark</button>
    </div>

    <div class="generate-row">
      <button id="expandBtn" class="btn-orange-outline" type="button" title="Rewrite your idea into a rich cinematic prompt">✨ EXPAND</button>
      <button id="generateBtn" class="btn-orange" type="button">GENERATE MEME 🦈</button>
    </div>
    <div class="hint" id="hint">Tip — type a short idea, hit ✨ Expand to make it cinematic, tweak it, then Generate.</div>

    <div class="loader" id="loader">
      <span class="shark-spin">🦈</span>
      <span class="label">Hunting pixels…</span>
      <span class="timer" id="timer">0s</span>
    </div>

    <div class="status" id="status"></div>
  </main>

  <div class="result-wrap" id="resultWrap" style="display:none;">
    <img id="resultImg" class="result-img" alt="Generated bitshark meme" />
    <div class="result-actions">
      <a id="downloadBtn" class="btn-orange-outline" download="bitshark-meme.png" href="#">DOWNLOAD</a>
      <a id="shareBtn" class="btn-orange-outline" target="_blank" rel="noopener" href="#">SHARE ON X</a>
      <button id="regenBtn" class="btn-orange-outline" type="button">REGENERATE</button>
    </div>
  </div>

  <div class="footer"><em>All Rights Reserved. Bitshark</em></div>

  <script>
    (function () {
      // Same-origin API on Vercel: serverless functions live at /api/*.
      const API_BASE = '';

      const promptEl = document.getElementById('prompt');
      const generateBtn = document.getElementById('generateBtn');
      const expandBtn = document.getElementById('expandBtn');
      const regenBtn = document.getElementById('regenBtn');
      const loader = document.getElementById('loader');
      const timer = document.getElementById('timer');
      const status = document.getElementById('status');
      const resultWrap = document.getElementById('resultWrap');
      const resultImg = document.getElementById('resultImg');
      const downloadBtn = document.getElementById('downloadBtn');
      const shareBtn = document.getElementById('shareBtn');

      document.querySelectorAll('#examples .chip').forEach((chip) => {
        chip.addEventListener('click', () => {
          promptEl.value = chip.dataset.prompt;
          promptEl.focus();
        });
      });

      let lastPrompt = '';
      let timerInterval = null;
      let cooldownInterval = null;
      let cooldownUntil = 0;

      function updateCooldownUI() {
        const remaining = Math.max(0, Math.ceil((cooldownUntil - Date.now()) / 1000));
        if (remaining > 0) {
          generateBtn.disabled = true;
          generateBtn.textContent = `WAIT ${remaining}s 🦈`;
          regenBtn.disabled = true;
        } else {
          generateBtn.disabled = false;
          generateBtn.textContent = 'GENERATE MEME 🦈';
          regenBtn.disabled = false;
          if (cooldownInterval) {
            clearInterval(cooldownInterval);
            cooldownInterval = null;
          }
        }
      }
      function startCooldown(seconds) {
        cooldownUntil = Date.now() + seconds * 1000;
        if (cooldownInterval) clearInterval(cooldownInterval);
        cooldownInterval = setInterval(updateCooldownUI, 250);
        updateCooldownUI();
      }

      function setStatus(msg, isError) {
        status.textContent = msg || '';
        status.classList.toggle('error', Boolean(isError));
      }

      function setLoading(on) {
        loader.classList.toggle('active', on);
        if (on) {
          generateBtn.disabled = true;
          generateBtn.textContent = 'GENERATING…';
        } else if (cooldownUntil <= Date.now()) {
          generateBtn.disabled = false;
          generateBtn.textContent = 'GENERATE MEME 🦈';
        }
        if (on) {
          const start = Date.now();
          timer.textContent = '0s';
          timerInterval = setInterval(() => {
            timer.textContent = Math.floor((Date.now() - start) / 1000) + 's';
          }, 250);
        } else if (timerInterval) {
          clearInterval(timerInterval);
          timerInterval = null;
        }
      }

      async function generate() {
        const prompt = promptEl.value.trim();
        if (prompt.length < 3) {
          setStatus('Type a meme idea first 🦈', true);
          return;
        }
        lastPrompt = prompt;
        setLoading(true);
        setStatus('');
        resultWrap.style.display = 'none';

        try {
          const resp = await fetch(API_BASE + '/api/generate', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ prompt }),
          });
          const data = await resp.json().catch(() => ({}));
          if (resp.status === 429 && data.retryAfter) {
            startCooldown(data.retryAfter);
            throw new Error(data.error || 'Rate limited');
          }
          if (!resp.ok) {
            throw new Error(data.error || ('HTTP ' + resp.status));
          }
          if (!data.image) throw new Error('No image returned');

          resultImg.src = data.image;
          downloadBtn.href = data.image;
          resultWrap.style.display = 'block';
          setStatus('Frenzy delivered. 🔥');
          resultWrap.scrollIntoView({ behavior: 'smooth', block: 'start' });
          startCooldown(60);
        } catch (err) {
          console.error(err);
          setStatus(err.message || 'Something went wrong', true);
        } finally {
          setLoading(false);
        }
      }

      async function expand() {
        const prompt = promptEl.value.trim();
        if (prompt.length < 2) {
          setStatus('Type a short idea first 🦈', true);
          return;
        }
        const original = expandBtn.textContent;
        expandBtn.disabled = true;
        expandBtn.textContent = '✨ EXPANDING…';
        setStatus('Making it cinematic…');
        try {
          const resp = await fetch(API_BASE + '/api/expand', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ prompt }),
          });
          const data = await resp.json().catch(() => ({}));
          if (!resp.ok) throw new Error(data.error || ('HTTP ' + resp.status));
          if (!data.expanded) throw new Error('No expansion returned');
          promptEl.value = data.expanded;
          promptEl.focus();
          promptEl.setSelectionRange(data.expanded.length, data.expanded.length);
          setStatus('Expanded — tweak it, then hit Generate 🦈');
        } catch (err) {
          console.error(err);
          setStatus(err.message || 'Expansion failed', true);
        } finally {
          expandBtn.disabled = false;
          expandBtn.textContent = original;
        }
      }

      expandBtn.addEventListener('click', expand);
      generateBtn.addEventListener('click', generate);
      regenBtn.addEventListener('click', () => {
        if (lastPrompt) {
          promptEl.value = lastPrompt;
          generate();
        }
      });
      promptEl.addEventListener('keydown', (e) => {
        if ((e.metaKey || e.ctrlKey) && e.key === 'Enter') generate();
      });

      shareBtn.addEventListener('click', async (e) => {
        e.preventDefault();
        if (!resultImg.src || !lastPrompt) return;
        const text = `Just made a $BITSHARK meme: "${lastPrompt}"\n\n🦈 bitshark.fun`;

        let blob = null;
        try {
          blob = await (await fetch(resultImg.src)).blob();
        } catch (err) {
          console.warn('Could not fetch meme image as blob:', err);
        }

        const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);

        // Mobile: native share sheet attaches the image directly to X / Telegram / etc.
        if (isMobile && blob && navigator.canShare) {
          try {
            const file = new File([blob], 'bitshark-meme.png', { type: blob.type || 'image/png' });
            if (navigator.canShare({ files: [file] })) {
              await navigator.share({ files: [file], text });
              setStatus('Shared! 🦈');
              return;
            }
          } catch (err) {
            if (err.name === 'AbortError') return;
            console.warn('Web Share fell through:', err);
          }
        }

        // Desktop: copy image to clipboard — user just presses ⌘V in the X compose box.
        if (blob && navigator.clipboard && window.ClipboardItem) {
          try {
            await navigator.clipboard.write([
              new ClipboardItem({ [blob.type || 'image/png']: blob }),
            ]);
            setStatus('Image copied to clipboard — paste it (⌘V / Ctrl+V) in the X tab 🦈');
            window.open(`https://twitter.com/intent/tweet?text=${encodeURIComponent(text)}`, '_blank', 'noopener');
            return;
          } catch (err) {
            console.warn('Clipboard write failed:', err);
          }
        }

        // Last resort: download + open X intent, user drags the image in.
        const a = document.createElement('a');
        a.href = resultImg.src;
        a.download = 'bitshark-meme.png';
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        setStatus('Meme downloaded — drag it into the X tab that just opened 🦈');
        setTimeout(() => {
          window.open(`https://twitter.com/intent/tweet?text=${encodeURIComponent(text)}`, '_blank', 'noopener');
        }, 400);
      });
    })();
  </script>

</body>
</html>
